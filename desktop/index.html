<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared Pomodoro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      overflow: hidden;
    }
    
    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .view {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 350px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
      color: #667eea;
    }
    
    h2 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 18px;
      color: #555;
    }
    
    input, select, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      background: #667eea;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }
    
    button:hover {
      background: #5568d3;
    }
    
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    button.secondary {
      background: #e74c3c;
    }
    
    button.secondary:hover {
      background: #c0392b;
    }
    
    .timer-display {
      font-size: 64px;
      font-weight: bold;
      text-align: center;
      margin: 30px 0;
      color: #667eea;
      font-variant-numeric: tabular-nums;
    }
    
    .phase-display {
      text-align: center;
      font-size: 20px;
      margin-bottom: 10px;
      color: #555;
    }
    
    .session-name {
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #333;
    }
    
    .pomodoro-count {
      text-align: center;
      font-size: 14px;
      margin-bottom: 20px;
      color: #666;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .button-group button {
      flex: 1;
      margin-bottom: 0;
    }
    
    #session-view, #session-select-view {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login View -->
    <div id="login-view" class="view">
      <h1>🍅 Shared Pomodoro</h1>
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <button id="login-btn">Login</button>
    </div>
    
    <!-- Session Select View -->
    <div id="session-select-view" class="view">
      <h1>🍅 Select Session</h1>
      <select id="session-select">
        <option value="">Select a session...</option>
      </select>
      <button id="load-session-btn">Load Session</button>
    </div>
    
    <!-- Session View -->
    <div id="session-view" class="view">
      <div class="session-name" id="session-name">Loading...</div>
      <div class="phase-display" id="phase-display">🍅 Focus Time</div>
      <div class="timer-display" id="timer-display">25:00</div>
      <div class="pomodoro-count" id="pomodoro-count">0 pomodoros completed</div>
      
      <div class="button-group">
        <button id="start-btn">▶️ Start</button>
        <button id="pause-btn" style="display:none;">⏸️ Pause</button>
        <button id="reset-btn">🔄 Reset</button>
      </div>
      
      <button id="logout-btn" class="secondary">Logout</button>
    </div>
  </div>
  
  <script src="renderer.js"></script>
</body>
</html>
