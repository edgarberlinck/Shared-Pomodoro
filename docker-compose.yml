version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shared-pomodoro-db
    restart: unless-stopped
    ports:
      - "55006:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shared_pomodoro
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
